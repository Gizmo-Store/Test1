<!DOCTYPE html>
<html lang="my">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nai Lin Oo - Profile Card</title>
  <style>
    body {
      background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #311042 100%);
      font-family: sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .profile-card {
      background-color: rgba(255, 255, 255, 0.95);
      padding: 40px 30px;
      border-radius: 24px;
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3);
      text-align: center;
      width: 350px;
    }

    .img-container {
      position: relative;
      width: 110px;
      height: 110px;
      margin: 0 auto 20px;
    }
    
    .profile-img {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      object-fit: cover;
      border: 4px solid #fff;
      box-shadow: 0 0 20px rgba(99, 102, 241, 0.6);
    }
    
    .status-dot {
      position: absolute;
      bottom: 12px;
      right: 12px;
      width: 14px;
      height: 14px;
      background-color: #22c55e;
      border: 2px solid white;
      border-radius: 50%;
    }

    h1 {
      font-size: 22px;
      color: #1e293b;
      margin-bottom: 12px;
      line-height: 1.4;
    }
    
    p {
      color: #64748b;
      font-size: 14px;
      margin-bottom: 25px;
      line-height: 1.6;
    }

    .social-links {
      display: flex;
      justify-content: center;
      gap: 15px;
      margin-bottom: 30px;
    }
    
    .social-icon {
      display: flex;
      justify-content: center;
      align-items: center;
      width: 45px;
      height: 45px;
      border-radius: 50%;
      background-color: #f1f5f9;
      text-decoration: none;
      transition: all 0.3s ease;
    }
    
    .social-icon:hover {
      transform: translateY(-5px);
      background-color: #e2e8f0;
      box-shadow: 0 5px 10px rgba(0,0,0,0.1);
    }

    .cta-btn {
      background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
      color: white;
      border: none;
      padding: 12px 35px;
      border-radius: 30px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 4px 15px rgba(124, 58, 237, 0.4);
      transition: 0.3s;
    }
    
    .cta-btn:hover {
      transform: scale(1.05);
      box-shadow: 0 6px 20px rgba(124, 58, 237, 0.6);
    }
  </style>
</head>
<body>

  <div class="profile-card">
    <div class="img-container">
      <img src="https://i.ibb.co/GfT3Rs85/IMG-0860.jpg" class="profile-img" alt="Nai Lin Oo">
      <span class="status-dot"></span>
    </div>
    
    <h1>မင်္ဂလာပါ ကျွန်တော်ကတော့ နိုင်လင်းဦး ဖြစ်ပါတယ်။</h1>
    <p>ဒါကတော့ ကျွန်တော့်ရဲ့ ပထမဆုံး Modern websiteလေး ဖြစ်ပါတယ်။</p>
    
    <div class="social-links">
      <a href="https://www.facebook.com/nailingoo.2922" target="_blank" class="social-icon">
        <img src="https://cdn-icons-png.flaticon.com/512/733/733547.png" style="width:22px; height:22px;" alt="Facebook">
      </a>
      
      <a href="https://www.instagram.com/nailing.oo?igsh=MTdzMXpyaWlrYmpvaw%3D%3D&utm_source=qr" target="_blank" class="social-icon">
        <img src="https://cdn-icons-png.flaticon.com/512/2111/2111463.png" style="width:22px; height:22px;" alt="Instagram">
      </a>
      
      <a href="mailto:nailingoo.2922@gmail.com" class="social-icon">
        <img src="https://cdn-icons-png.flaticon.com/512/732/732200.png" style="width:22px; height:22px;" alt="Gmail">
      </a>
    </div>
    
    <button class="cta-btn">Get in Touch</button>
  </div>

</body>
</html>
